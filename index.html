<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Relay · 後台</title>
<style>
  /* ── 和紙・墨・朱印 配色 ───────────────────────────── */
  :root{
    --paper:#f4f1ea; --paper-2:#fbf9f4; --ink:#1c1a17; --ink-2:#4a463e;
    --line:#d8d2c4; --line-2:#e7e2d6; --seal:#b03a2e; --seal-2:#9a3226;
    --good:#5b7a52; --mut:#8c8678;
    --shadow:0 1px 0 #fff, 0 2px 8px rgba(28,26,23,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    font-size:15px; line-height:1.6;
    /* 純 CSS 紙紋 */
    background-image:
      radial-gradient(rgba(28,26,23,.018) 1px, transparent 1px),
      radial-gradient(rgba(28,26,23,.018) 1px, transparent 1px);
    background-size:18px 18px, 18px 18px;
    background-position:0 0, 9px 9px;
  }
  button{font-family:inherit}
  a{color:var(--seal);text-decoration:none}
  .app{display:flex;min-height:100vh}

  /* ── 側欄 ───────────────────────────── */
  .side{width:212px;flex:0 0 212px;border-right:1px solid var(--line);
        padding:26px 18px;position:sticky;top:0;height:100vh;background:var(--paper)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:34px}
  .seal{width:34px;height:34px;flex:0 0 34px;border:2px solid var(--seal);border-radius:5px;
        display:flex;align-items:center;justify-content:center;color:var(--seal);
        font-weight:700;font-size:18px;transform:rotate(-2deg)}
  .brand b{font-size:18px;letter-spacing:3px;font-weight:700}
  .brand small{display:block;color:var(--mut);letter-spacing:2px;font-size:10px;margin-top:1px}
  .nav{list-style:none;padding:0;margin:0}
  .nav li{padding:10px 12px;border-radius:7px;cursor:pointer;display:flex;gap:10px;
          align-items:center;color:var(--ink-2);letter-spacing:2px;margin-bottom:2px}
  .nav li:hover{background:var(--line-2)}
  .nav li.on{background:var(--ink);color:var(--paper)}
  .nav li.on svg{stroke:var(--paper)}
  .nav svg{width:17px;height:17px;stroke:var(--ink-2);fill:none;stroke-width:1.6}
  .side .foot{position:absolute;bottom:22px;left:18px;right:18px;font-size:11px;color:var(--mut);letter-spacing:1px}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .dot.demo{background:var(--seal)} .dot.live{background:var(--good)}

  /* ── 主區 ───────────────────────────── */
  .main{flex:1;padding:30px 38px;max-width:1100px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;
        border-bottom:1px solid var(--line);padding-bottom:14px}
  .head h1{margin:0;font-size:23px;letter-spacing:4px;font-weight:700}
  .head p{margin:3px 0 0;color:var(--mut);font-size:13px;letter-spacing:1px}

  /* 元件 */
  .btn{border:1px solid var(--ink);background:var(--ink);color:var(--paper);
       padding:8px 16px;border-radius:7px;cursor:pointer;letter-spacing:2px;font-size:14px}
  .btn:hover{background:#000}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.ghost:hover{background:var(--line-2)}
  .btn.seal{background:var(--seal);border-color:var(--seal)}
  .btn.seal:hover{background:var(--seal-2)}
  .btn.sm{padding:5px 11px;font-size:12.5px}
  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:10px;
        padding:18px 20px;box-shadow:var(--shadow)}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .stat .k{color:var(--mut);font-size:12px;letter-spacing:2px}
  .stat .v{font-size:30px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
  .row2{display:grid;grid-template-columns:1.6fr 1fr;gap:18px}
  .sect-t{font-size:13px;letter-spacing:3px;color:var(--ink-2);margin:0 0 12px;
          display:flex;align-items:center;gap:8px}
  .sect-t::before{content:"";width:14px;height:1px;background:var(--seal)}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;color:var(--mut);font-weight:500;letter-spacing:1px;font-size:12px;
     padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:11px 10px;border-bottom:1px solid var(--line-2);vertical-align:middle}
  tr:hover td{background:#fff}
  .slug{font-weight:600;letter-spacing:1px}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;letter-spacing:1px;
         border:1px solid var(--line)}
  .badge.ab{color:#7a5b2e;border-color:#d8c3a0;background:#f6efe0}
  .badge.device{color:#2e5b7a;border-color:#a0c3d8;background:#e0eef6}
  .badge.simple{color:var(--ink-2)}
  .badge.off{color:var(--seal);border-color:#e3b6b0;background:#f7e6e3}
  .lock{stroke:var(--seal)}
  .acts{display:flex;gap:6px;justify-content:flex-end}
  .iconbtn{border:1px solid var(--line);background:var(--paper-2);border-radius:6px;width:30px;height:30px;
           cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .iconbtn:hover{border-color:var(--ink)}
  .iconbtn svg{width:15px;height:15px;stroke:var(--ink-2);fill:none;stroke-width:1.6}
  .iconbtn.danger:hover{border-color:var(--seal)} .iconbtn.danger:hover svg{stroke:var(--seal)}
  .empty{text-align:center;color:var(--mut);padding:50px 0;letter-spacing:2px}

  /* 圖表 */
  .bars{list-style:none;margin:0;padding:0}
  .bars li{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:13px}
  .bars .lab{width:120px;flex:0 0 120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-2)}
  .bars .track{flex:1;height:9px;background:var(--line-2);border-radius:5px;overflow:hidden}
  .bars .fill{height:100%;background:var(--ink);border-radius:5px}
  .bars .fill.seal{background:var(--seal)}
  .bars .n{width:46px;flex:0 0 46px;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink-2)}

  /* 表單 / modal */
  .mask{position:fixed;inset:0;background:rgba(28,26,23,.42);display:none;align-items:flex-start;
        justify-content:center;padding:40px 16px;overflow:auto;z-index:50}
  .mask.on{display:flex}
  .modal{background:var(--paper);border:1px solid var(--line);border-radius:12px;width:640px;max-width:100%;
         padding:26px 28px;box-shadow:0 18px 50px rgba(28,26,23,.25)}
  .modal h2{margin:0 0 18px;font-size:19px;letter-spacing:3px}
  .fld{margin-bottom:15px}
  .fld>label{display:block;font-size:12.5px;letter-spacing:1px;color:var(--ink-2);margin-bottom:5px}
  .fld .hint{color:var(--mut);font-size:11.5px;letter-spacing:.5px}
  input[type=text],input[type=password],input[type=number],input[type=url],
  input[type=datetime-local],select,textarea{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;background:#fff;
    font-family:inherit;font-size:14px;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:none;background:var(--paper-2);padding:8px 14px;cursor:pointer;font-size:13px;
              letter-spacing:1px;color:var(--ink-2);border-right:1px solid var(--line)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--ink);color:var(--paper)}
  .abrow{display:grid;grid-template-columns:1fr 70px 100px 32px;gap:8px;margin-bottom:8px;align-items:center}
  .abrow .x{border:1px solid var(--line);background:var(--paper-2);border-radius:6px;height:38px;cursor:pointer;color:var(--seal)}
  .preview{display:flex;gap:16px;align-items:center;border:1px dashed var(--line);border-radius:9px;
           padding:14px;background:var(--paper-2);margin-top:6px}
  .preview .qr{width:96px;height:96px;flex:0 0 96px;border:1px solid var(--line);background:#fff;border-radius:6px}
  .preview .u{font-size:15px;font-weight:600;word-break:break-all}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;border-top:1px solid var(--line);padding-top:16px}
  .grp{border:1px solid var(--line-2);border-radius:9px;padding:14px;margin-bottom:15px}
  .grp>.t{font-size:12px;letter-spacing:2px;color:var(--mut);margin-bottom:10px}

  .copy{cursor:pointer;border:1px solid var(--line);background:var(--paper-2);border-radius:6px;
        padding:3px 9px;font-size:12px;color:var(--ink-2)}
  .copy:hover{border-color:var(--ink)}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
         background:var(--ink);color:var(--paper);padding:11px 20px;border-radius:8px;letter-spacing:2px;
         opacity:0;transition:.25s;z-index:90;font-size:14px}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .heat{display:flex;gap:3px;align-items:flex-end;height:60px}
  .heat .h{flex:1;background:var(--ink);border-radius:2px 2px 0 0;min-height:2px}
  .note{font-size:11.5px;color:var(--mut);letter-spacing:.5px;margin-top:8px}
  .kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
  .kv .k{color:var(--mut)}
  @media(max-width:820px){.side{display:none}.main{padding:20px}.grid4{grid-template-columns:1fr 1fr}.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <!-- 側欄 -->
  <aside class="side">
    <div class="brand">
      <div class="seal">繼</div>
      <div><b>RELAY</b><small>短 網 址 後 台</small></div>
    </div>
    <ul class="nav" id="nav">
      <li data-v="overview" class="on">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3zM13 21h8V11h-8zM13 3v6h8V3zM3 21h8v-6H3z"/></svg>總覽</li>
      <li data-v="links">
        <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>連結</li>
      <li data-v="settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.4-2.6h-4l-.4 2.6a7 7 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.4 2.6h4l.4-2.6a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5a7 7 0 0 0 .1-1z"/></svg>設定</li>
    </ul>
    <div class="foot"><span id="modeDot" class="dot demo"></span><span id="modeText">DEMO 模式</span></div>
  </aside>

  <!-- 主區 -->
  <main class="main" id="view"></main>
</div>

<!-- 連結編輯 modal -->
<div class="mask" id="mask">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════ 設定 / 狀態 ════════════════════ */
const LS = { base:'relay_api_base', token:'relay_token' };
// 防護版 localStorage：用 file:// 開檔時某些瀏覽器存取會丟錯，包起來避免整頁白屏
const store = {
  get(k){ try{ return localStorage.getItem(k) || ''; }catch(_){ return ''; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(_){} },
  del(k){ try{ localStorage.removeItem(k); }catch(_){} },
};
const state = {
  view:'overview',
  base: store.get(LS.base),
  token: store.get(LS.token),
  get demo(){ return !this.base; },   // 沒設 API 位址＝DEMO 模式
  links: [],
};

/* ════════════════════ API 層（真機 / DEMO 共用介面） ════════════════════ */
const api = {
  async overview(){ return state.demo ? demo.overview() : req('GET','/api/overview'); },
  async list(){ return state.demo ? demo.list() : req('GET','/api/links'); },
  async get(id){ return state.demo ? demo.get(id) : req('GET','/api/links/'+id); },
  async create(b){ return state.demo ? demo.create(b) : req('POST','/api/links',b); },
  async update(id,b){ return state.demo ? demo.update(id,b) : req('PATCH','/api/links/'+id,b); },
  async del(id){ return state.demo ? demo.del(id) : req('DELETE','/api/links/'+id); },
  async stats(id,days){ return state.demo ? demo.stats(id,days) : req('GET','/api/stats/'+id+'?days='+days); },
};
async function req(method, path, body){
  const r = await fetch(state.base.replace(/\/$/,'') + path, {
    method,
    headers:{ 'authorization':'Bearer '+state.token,
              ...(body?{'content-type':'application/json'}:{}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error || ('HTTP '+r.status));
  return data;
}

/* ════════════════════ DEMO 假資料引擎 ════════════════════ */
const demo = (()=>{
  let seq = 100;
  let links = [
    mk('spring','春季新品快閃','ab',{ variants:[
        {url:'https://shop.example.com/lp-a',weight:1,label:'A 簡約版'},
        {url:'https://shop.example.com/lp-b',weight:1,label:'B 促銷版'}],
        pixel_fb:'123456789012345'}),
    mk('app','App 下載','device',{ variants:{
        ios:'https://apps.apple.com/app/id000',
        android:'https://play.google.com/store/apps/details?id=x',
        default:'https://example.com/app'}}),
    mk('vip','VIP 預購（密碼）','simple',{ target_url:'https://example.com/vip', has_password:true,
        pixel_ga:'G-XXXXXXX' }),
    mk('news','電子報導流','simple',{ target_url:'https://example.com/newsletter',
        utm:{source:'ig',medium:'social',campaign:'jun'} }),
    mk('event','講座報名','simple',{ target_url:'https://www.accupass.com/event/xxx', redirect_type:301 }),
  ];
  function mk(slug,title,mode,extra){
    return Object.assign({ id:seq++, slug, title, mode, target_url:'', variants:null,
      redirect_type:302, has_password:false, pixel_fb:'',pixel_ga:'',pixel_gtm:'',
      utm:null, expires_at:'', active:true, created_at:new Date().toISOString(),
      clicks: 60 + (hash(slug)%900) }, extra);
  }
  // 以 slug 為種子的穩定亂數，讓 demo 圖表每次一致
  function hash(s){ let h=2166136261; for(const c of s){ h^=c.charCodeAt(0); h=Math.imul(h,16777619);} return Math.abs(h); }
  function rng(seed){ let x=seed%2147483647; if(x<=0)x+=2147483646; return ()=>(x=(x*16807)%2147483647)/2147483647; }
  function series(slug,days){
    const r=rng(hash(slug)); const out=[]; const today=new Date();
    for(let i=days-1;i>=0;i--){ const d=new Date(today-i*86400000);
      out.push({ day:d.toISOString().slice(0,10), n:Math.round(2+ r()*r()*40) }); }
    return out;
  }
  function brk(slug,keys){ const r=rng(hash(slug)+keys.length);
    return keys.map(k=>({k,n:Math.round(5+r()*100)})).sort((a,b)=>b.n-a.n); }
  return {
    overview(){
      const totalClicks = links.reduce((s,l)=>s+l.clicks,0);
      return Promise.resolve({ totals:{
          links:links.length, active:links.filter(l=>l.active).length,
          clicks:totalClicks, today:Math.round(totalClicks*0.04) },
        series: series('__overview__',14),
        top: [...links].sort((a,b)=>b.clicks-a.clicks).slice(0,5)
              .map(l=>({id:l.id,slug:l.slug,title:l.title,clicks:l.clicks})) });
    },
    list(){ return Promise.resolve({ links: links.map(clone) }); },
    get(id){ const l=links.find(x=>x.id==id); if(!l)return Promise.reject(new Error('not found'));
             return Promise.resolve({link:clone(l)}); },
    create(b){ if(links.some(l=>l.slug===b.slug)) return Promise.reject(new Error('slug 已被使用'));
      const l=mk(b.slug,b.title||'',b.mode||'simple',{}); apply(l,b); links.unshift(l);
      return Promise.resolve({id:l.id,slug:l.slug}); },
    update(id,b){ const l=links.find(x=>x.id==id); if(!l)return Promise.reject(new Error('not found'));
      if(b.slug&&links.some(x=>x.slug===b.slug&&x.id!=id))return Promise.reject(new Error('slug 已被使用'));
      apply(l,b); return Promise.resolve({id:l.id,slug:l.slug}); },
    del(id){ links=links.filter(x=>x.id!=id); return Promise.resolve({ok:true}); },
    stats(id,days){ const l=links.find(x=>x.id==id); if(!l)return Promise.reject(new Error('not found'));
      const s=l.slug;
      const bd={ device:brk(s+'d',['mobile','desktop','tablet']),
        os:brk(s+'o',['iOS','Android','Windows','macOS']),
        country:brk(s+'c',['TW','HK','US','JP','MY']),
        referrer:brk(s+'r',['(direct)','instagram.com','facebook.com','t.co','line.me']),
        suffix: l.mode==='ab'?[]:brk(s+'k',['ig','threads','fb','(direct)']),
        variant: l.mode==='ab'? (l.variants||[]).map((v,i)=>({k:v.label||('變體'+i),n:80+hash(s+i)%200}))
                 : l.mode==='device'? brk(s+'v',['ios','android','default']) : [{k:'default',n:l.clicks}],
        hour: Array.from({length:24},(_,h)=>({k:h,n:Math.round(2+ (Math.sin(h/3)+1)*8 + hash(s+h)%6)})) };
      return Promise.resolve({ link:clone(l), total:l.clicks, series:series(s,days), breakdown:bd });
    },
  };
  function apply(l,b){
    if(b.slug!==undefined)l.slug=b.slug; if(b.title!==undefined)l.title=b.title;
    if(b.mode)l.mode=b.mode; if(b.target_url!==undefined)l.target_url=b.target_url;
    if(b.variants!==undefined)l.variants=b.variants;
    if(b.redirect_type)l.redirect_type=b.redirect_type;
    if(b.password!==undefined)l.has_password=!!b.password;
    ['pixel_fb','pixel_ga','pixel_gtm'].forEach(k=>{ if(b[k]!==undefined)l[k]=b[k]; });
    if(b.utm!==undefined)l.utm=b.utm; if(b.expires_at!==undefined)l.expires_at=b.expires_at;
    if(b.active!==undefined)l.active=!!b.active;
  }
  function clone(l){ return JSON.parse(JSON.stringify(l)); }
})();

/* ════════════════════ 共用工具 ════════════════════ */
const $ = (s,el=document)=>el.querySelector(s);
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>(
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function shortUrl(slug){ const base = state.base ? state.base.replace(/\/$/,'') : 'https://relay.to';
  return base + '/' + slug; }
function modeLabel(m){ return {simple:'單一',ab:'A/B 分流',device:'裝置導流'}[m]||m; }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),1800); }
function copy(text){ navigator.clipboard.writeText(text).then(()=>toast('已複製：'+text),
  ()=>toast('複製失敗')); }
function qr(text){ // DEMO/預覽用外部產生器；正式版建議自架（見 README）
  return 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=0&data='+encodeURIComponent(text); }

/* 手繪風 SVG 折線圖（無外部依賴） */
function lineChart(series, w=540, h=150){
  if(!series||!series.length) return '<div class="empty">尚無資料</div>';
  const pad={l:6,r:6,t:12,b:18}; const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const max=Math.max(...series.map(d=>d.n),1);
  const X=i=>pad.l + (series.length<=1?iw/2:iw*i/(series.length-1));
  const Y=v=>pad.t + ih - ih*v/max;
  const pts=series.map((d,i)=>[X(i),Y(d.n)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L ${X(series.length-1).toFixed(1)} ${(pad.t+ih).toFixed(1)} L ${X(0).toFixed(1)} ${(pad.t+ih).toFixed(1)} Z`;
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.4" fill="#b03a2e"/>`).join('');
  const first=series[0].day?series[0].day.slice(5):''; const last=series[series.length-1].day?series[series.length-1].day.slice(5):'';
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">
    <line x1="${pad.l}" y1="${pad.t+ih}" x2="${w-pad.r}" y2="${pad.t+ih}" stroke="#d8d2c4"/>
    <path d="${area}" fill="rgba(176,58,46,.07)"/>
    <path d="${line}" fill="none" stroke="#1c1a17" stroke-width="1.6" stroke-linejoin="round"/>
    ${dots}
    <text x="${pad.l}" y="${h-4}" font-size="10" fill="#8c8678">${first}</text>
    <text x="${w-pad.r}" y="${h-4}" font-size="10" fill="#8c8678" text-anchor="end">${last}</text>
    <text x="${pad.l}" y="${pad.t+6}" font-size="10" fill="#8c8678">${max}</text>
  </svg>`;
}
function barList(items, sealTop=false){
  if(!items||!items.length) return '<div class="empty" style="padding:24px">尚無資料</div>';
  const max=Math.max(...items.map(d=>d.n),1);
  return '<ul class="bars">'+items.map((d,i)=>`<li>
    <span class="lab" title="${esc(d.k)}">${esc(d.k)}</span>
    <span class="track"><span class="fill ${sealTop&&i===0?'seal':''}" style="width:${(d.n/max*100).toFixed(1)}%"></span></span>
    <span class="n">${d.n}</span></li>`).join('')+'</ul>';
}
function hourHeat(items){
  const map={}; (items||[]).forEach(d=>map[d.k]=d.n);
  const arr=Array.from({length:24},(_,h)=>map[h]||0); const max=Math.max(...arr,1);
  return '<div class="heat">'+arr.map((n,h)=>`<div class="h" title="${h}:00 · ${n}" style="height:${(n/max*100).toFixed(0)}%"></div>`).join('')+'</div>'+
    '<div class="note">時段（UTC 小時）· 滑過看數值</div>';
}

/* ════════════════════ 視圖路由 ════════════════════ */
function setView(v){ state.view=v;
  document.querySelectorAll('#nav li').forEach(li=>li.classList.toggle('on',li.dataset.v===v));
  render();
}
$('#nav').addEventListener('click',e=>{ const li=e.target.closest('li'); if(li) setView(li.dataset.v); });

async function render(){
  refreshModeBadge();
  const v=$('#view');
  try{
    if(state.view==='overview') return renderOverview(v);
    if(state.view==='links') return renderLinks(v);
    if(state.view==='settings') return renderSettings(v);
  }catch(e){ v.innerHTML = head('發生錯誤','') + `<div class="card"><div class="empty">${esc(e.message)}<br><br>請到「設定」確認 API 位址與金鑰。</div></div>`; }
}
function refreshModeBadge(){
  $('#modeDot').className = 'dot '+(state.demo?'demo':'live');
  $('#modeText').textContent = state.demo ? 'DEMO 模式' : '已連線';
}
function head(title,sub,right=''){ return `<div class="head"><div>
  <h1>${title}</h1>${sub?`<p>${sub}</p>`:''}</div><div>${right}</div></div>`; }

/* ── 總覽 ── */
async function renderOverview(v){
  v.innerHTML = head('總覽','過去 14 天點擊趨勢與重點連結');
  const d = await api.overview();
  const t=d.totals;
  v.innerHTML += `
    <div class="grid4">
      ${stat('連結總數',t.links)}${stat('啟用中',t.active)}
      ${stat('累計點擊',t.clicks)}${stat('今日點擊',t.today)}
    </div>
    <div class="row2">
      <div class="card"><p class="sect-t">點擊趨勢</p>${lineChart(d.series)}</div>
      <div class="card"><p class="sect-t">熱門連結</p>
        ${(d.top||[]).length? barList(d.top.map(x=>({k:'/'+x.slug,n:x.clicks})),true)
          :'<div class="empty">尚無資料</div>'}
      </div>
    </div>`;
}
function stat(k,v){ return `<div class="card stat"><div class="k">${k}</div><div class="v">${v}</div></div>`; }

/* ── 連結列表 ── */
async function renderLinks(v){
  v.innerHTML = head('連結','管理你所有短網址',
    `<button class="btn seal" onclick="openForm()">＋ 新增連結</button>`);
  const d = await api.list();
  state.links = d.links;
  if(!d.links.length){ v.innerHTML += `<div class="card"><div class="empty">還沒有任何連結，按右上角新增一個吧。</div></div>`; return; }
  v.innerHTML += `<div class="card"><table><thead><tr>
    <th>短碼</th><th>備註</th><th>模式</th><th>點擊</th><th>狀態</th><th></th></tr></thead><tbody>${
    d.links.map(rowLink).join('')}</tbody></table></div>`;
}
function rowLink(l){
  const lock = l.has_password ? `<svg style="width:13px;height:13px;vertical-align:-2px;fill:none;stroke-width:1.8" class="lock" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>` : '';
  return `<tr>
    <td><span class="slug">/${esc(l.slug)}</span> ${lock}</td>
    <td>${esc(l.title)||'<span style="color:#bbb">—</span>'}</td>
    <td><span class="badge ${l.mode}">${modeLabel(l.mode)}</span></td>
    <td style="font-variant-numeric:tabular-nums">${l.clicks ?? 0}</td>
    <td>${l.active?'<span class="badge" style="color:#5b7a52;border-color:#bcd0b4">啟用</span>':'<span class="badge off">停用</span>'}</td>
    <td><div class="acts">
      <button class="iconbtn" title="數據" onclick="openStats(${l.id})"><svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg></button>
      <button class="iconbtn" title="複製短網址" onclick="copy('${esc(shortUrl(l.slug))}')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg></button>
      <button class="iconbtn" title="編輯" onclick="openForm(${l.id})"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
      <button class="iconbtn danger" title="刪除" onclick="delLink(${l.id},'${esc(l.slug)}')"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
    </div></td></tr>`;
}
async function delLink(id,slug){
  if(!confirm('確定刪除 /'+slug+' ？此動作連同點擊紀錄一併刪除，無法復原。')) return;
  try{ await api.del(id); toast('已刪除 /'+slug); renderLinks($('#view')); }
  catch(e){ toast('刪除失敗：'+e.message); }
}

/* ── 數據詳情 ── */
async function openStats(id, days=30){
  const v=$('#view');
  const d = await api.stats(id, days);
  const l=d.link;
  const seg=[7,30,90].map(n=>`<button class="${n===days?'on':''}" onclick="openStats(${id},${n})">${n} 天</button>`).join('');
  v.innerHTML = head('/'+esc(l.slug), esc(l.title||'連結數據'),
    `<button class="btn ghost" onclick="setView('links')">← 返回</button>`);
  v.innerHTML += `
    <div class="row2" style="margin-bottom:18px">
      <div class="card">
        <p class="sect-t">點擊趨勢　<span style="margin-left:auto"></span></p>
        <div class="seg" style="margin-bottom:12px">${seg}</div>
        ${lineChart(d.series)}
      </div>
      <div class="card">
        <p class="sect-t">短網址</p>
        <div style="font-size:17px;font-weight:600;margin-bottom:6px;word-break:break-all">${esc(shortUrl(l.slug))}
          <button class="copy" onclick="copy('${esc(shortUrl(l.slug))}')">複製</button></div>
        <div class="preview"><img class="qr" src="${qr(shortUrl(l.slug))}" alt="QR">
          <div><div class="kv"><span class="k">總點擊</span><b>${d.total}</b></div>
          <div class="kv"><span class="k">模式</span><span>${modeLabel(l.mode)}</span></div>
          <div class="kv"><span class="k">轉址</span><span>${l.redirect_type}</span></div>
          <div class="kv"><span class="k">像素</span><span>${[l.pixel_fb&&'FB',l.pixel_ga&&'GA4',l.pixel_gtm&&'GTM'].filter(Boolean).join(' ')||'—'}</span></div>
          </div></div>
      </div>
    </div>
    <div class="row2" style="margin-bottom:18px">
      <div class="card"><p class="sect-t">${l.mode==='ab'?'A/B 變體成效':l.mode==='device'?'裝置變體':'KOL 來源（/suffix）'}</p>
        ${barList((l.mode==='simple'?d.breakdown.suffix:d.breakdown.variant),true)}</div>
      <div class="card"><p class="sect-t">裝置</p>${barList(d.breakdown.device)}</div>
    </div>
    <div class="row2" style="margin-bottom:18px">
      <div class="card"><p class="sect-t">作業系統</p>${barList(d.breakdown.os)}</div>
      <div class="card"><p class="sect-t">國家 / 地區</p>${barList(d.breakdown.country)}</div>
    </div>
    <div class="row2">
      <div class="card"><p class="sect-t">來源網站</p>${barList(d.breakdown.referrer)}</div>
      <div class="card"><p class="sect-t">時段熱度</p>${hourHeat(d.breakdown.hour)}</div>
    </div>`;
}

/* ── 設定 ── */
function renderSettings(v){
  v.innerHTML = head('設定','連線到你的 Cloudflare Worker；留空則為離線 DEMO');
  v.innerHTML += `<div class="card" style="max-width:560px">
    <div class="fld"><label>Worker API 位址</label>
      <input type="text" id="setBase" placeholder="https://relay.你的子網域.workers.dev" value="${esc(state.base)}">
      <div class="hint">部署 worker.js 後得到的網址。留空＝使用離線 DEMO 假資料。</div></div>
    <div class="fld"><label>後台金鑰 ADMIN_TOKEN</label>
      <input type="password" id="setToken" placeholder="與 wrangler secret put ADMIN_TOKEN 相同" value="${esc(state.token)}">
      <div class="hint">只存在這台瀏覽器的 localStorage，不會外傳。</div></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn" onclick="saveSettings()">儲存</button>
      <button class="btn ghost" onclick="testConn()">測試連線</button>
      <button class="btn ghost" onclick="clearSettings()">清除（回 DEMO）</button>
    </div>
    <div id="connResult" class="note"></div>
  </div>`;
}
function saveSettings(){
  state.base=$('#setBase').value.trim(); state.token=$('#setToken').value.trim();
  store.set(LS.base,state.base); store.set(LS.token,state.token);
  refreshModeBadge(); toast(state.demo?'已儲存（DEMO 模式）':'已儲存，已切換為連線模式');
}
async function testConn(){
  saveSettings(); const r=$('#connResult');
  if(state.demo){ r.textContent='目前為 DEMO 模式（未設定 API 位址）。'; return; }
  r.textContent='測試中…';
  try{ const d=await api.overview(); r.innerHTML='<span style="color:#5b7a52">連線成功</span>，目前 '+d.totals.links+' 個連結。'; }
  catch(e){ r.innerHTML='<span style="color:#b03a2e">連線失敗：'+esc(e.message)+'</span>'; }
}
function clearSettings(){ store.del(LS.base); store.del(LS.token);
  state.base=''; state.token=''; refreshModeBadge(); renderSettings($('#view')); toast('已清除，回到 DEMO 模式'); }

/* ════════════════════ 新增 / 編輯表單 ════════════════════ */
let formMode='simple';
async function openForm(id){
  let l = { slug:'', title:'', mode:'simple', target_url:'', variants:null, redirect_type:302,
    has_password:false, pixel_fb:'',pixel_ga:'',pixel_gtm:'', utm:null, expires_at:'', active:true };
  if(id){ const d=await api.get(id); l=d.link; }
  formMode=l.mode;
  const m=$('#modal');
  m.dataset.id = id||'';
  m.innerHTML = `
    <h2>${id?'編輯連結':'新增連結'}</h2>
    <div class="two">
      <div class="fld"><label>短碼 slug</label>
        <div style="display:flex;gap:8px"><input type="text" id="f_slug" value="${esc(l.slug)}" placeholder="spring">
        <button class="btn ghost sm" type="button" onclick="genSlug()">隨機</button></div></div>
      <div class="fld"><label>備註標題</label><input type="text" id="f_title" value="${esc(l.title)}" placeholder="春季新品快閃"></div>
    </div>

    <div class="fld"><label>導向模式</label>
      <div class="seg" id="modeSeg">
        <button type="button" data-m="simple" class="${l.mode==='simple'?'on':''}" onclick="switchMode('simple')">單一目的地</button>
        <button type="button" data-m="ab" class="${l.mode==='ab'?'on':''}" onclick="switchMode('ab')">A/B 分流</button>
        <button type="button" data-m="device" class="${l.mode==='device'?'on':''}" onclick="switchMode('device')">裝置導流</button>
      </div></div>
    <div id="modeFields"></div>

    <div class="two">
      <div class="fld"><label>轉址類型</label>
        <select id="f_rt"><option value="302" ${l.redirect_type!=301?'selected':''}>302 暫時</option>
        <option value="301" ${l.redirect_type==301?'selected':''}>301 永久</option></select></div>
      <div class="fld"><label>到期時間（選填）</label>
        <input type="datetime-local" id="f_exp" value="${l.expires_at?isoToLocal(l.expires_at):''}"></div>
    </div>
    <div class="fld"><label>密碼保護（選填）</label>
      <input type="password" id="f_pw" placeholder="${l.has_password?'（已設定，留空＝不變更）':'留空＝不設密碼'}">
      ${l.has_password?'<div class="hint">已設密碼。輸入新密碼可覆蓋，輸入單一空白再儲存可清除。</div>':''}</div>

    <div class="grp"><div class="t">行銷像素（中介頁觸發再行銷）</div>
      <div class="three">
        <div class="fld"><label>FB Pixel ID</label><input type="text" id="f_fb" value="${esc(l.pixel_fb)}" placeholder="123456789012345"></div>
        <div class="fld"><label>GA4 評估 ID</label><input type="text" id="f_ga" value="${esc(l.pixel_ga)}" placeholder="G-XXXXXXX"></div>
        <div class="fld"><label>GTM 容器 ID</label><input type="text" id="f_gtm" value="${esc(l.pixel_gtm)}" placeholder="GTM-XXXXXX"></div>
      </div>
      <div class="hint">填任一個就會走中介頁：先觸發像素把訪客寫進名單，再導向目的地。</div>
    </div>

    <div class="grp"><div class="t">UTM 參數（選填，自動附加到目的地）</div>
      <div class="three">
        <div class="fld"><label>source</label><input type="text" id="u_source" value="${esc(l.utm?l.utm.source:'')}" placeholder="ig"></div>
        <div class="fld"><label>medium</label><input type="text" id="u_medium" value="${esc(l.utm?l.utm.medium:'')}" placeholder="social"></div>
        <div class="fld"><label>campaign</label><input type="text" id="u_campaign" value="${esc(l.utm?l.utm.campaign:'')}" placeholder="jun"></div>
      </div>
      <div class="two">
        <div class="fld"><label>term</label><input type="text" id="u_term" value="${esc(l.utm?l.utm.term:'')}"></div>
        <div class="fld"><label>content</label><input type="text" id="u_content" value="${esc(l.utm?l.utm.content:'')}"></div>
      </div>
    </div>

    <div class="fld"><label>預覽</label>
      <div class="preview"><img class="qr" id="pvQr" src="${qr(shortUrl(l.slug||'preview'))}" alt="QR">
        <div><div class="u" id="pvUrl">${esc(shortUrl(l.slug||'…'))}</div>
        <div class="note">QR 為外部產生器預覽；正式環境請改自架產生器（見 README）。</div></div></div></div>

    <div class="modal-foot">
      <button class="btn ghost" type="button" onclick="closeForm()">取消</button>
      <button class="btn seal" type="button" onclick="submitForm()">${id?'儲存變更':'建立連結'}</button>
    </div>`;
  renderModeFields(l);
  $('#f_slug').addEventListener('input',updatePreview);
  $('#mask').classList.add('on');
}
function renderModeFields(l){
  const box=$('#modeFields'); const m=formMode;
  if(m==='simple'){
    box.innerHTML=`<div class="fld"><label>目的地網址</label>
      <input type="url" id="f_target" value="${esc(l.target_url||'')}" placeholder="https://example.com/landing"></div>`;
  } else if(m==='ab'){
    const vs = Array.isArray(l.variants)&&l.variants.length?l.variants:[{url:'',weight:1,label:'A'},{url:'',weight:1,label:'B'}];
    box.innerHTML=`<div class="fld"><label>變體（依權重隨機分流）</label>
      <div id="abRows">${vs.map(abRow).join('')}</div>
      <button class="btn ghost sm" type="button" onclick="addAbRow()">＋ 新增變體</button></div>`;
  } else {
    const d=l.variants&&!Array.isArray(l.variants)?l.variants:{};
    box.innerHTML=`<div class="fld"><label>iOS 目的地</label><input type="url" id="d_ios" value="${esc(d.ios||'')}" placeholder="https://apps.apple.com/..."></div>
      <div class="fld"><label>Android 目的地</label><input type="url" id="d_android" value="${esc(d.android||'')}" placeholder="https://play.google.com/..."></div>
      <div class="fld"><label>其他（預設）</label><input type="url" id="d_default" value="${esc(d.default||'')}" placeholder="https://example.com"></div>`;
  }
}
function abRow(v={url:'',weight:1,label:''}){
  return `<div class="abrow">
    <input type="url" class="ab_url" value="${esc(v.url)}" placeholder="https://...">
    <input type="number" class="ab_weight" value="${v.weight||1}" min="1" placeholder="權重">
    <input type="text" class="ab_label" value="${esc(v.label||'')}" placeholder="標籤">
    <button type="button" class="x" onclick="this.closest('.abrow').remove()">×</button></div>`;
}
function addAbRow(){ $('#abRows').insertAdjacentHTML('beforeend', abRow()); }
function switchMode(m){ formMode=m;
  document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  renderModeFields({mode:m,variants:null,target_url:''}); }
function genSlug(){ const c='abcdefghijkmnpqrstuvwxyz23456789'; let s='';
  for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)];
  $('#f_slug').value=s; updatePreview(); }
function updatePreview(){ const s=$('#f_slug').value.trim()||'…';
  $('#pvUrl').textContent=shortUrl(s); $('#pvQr').src=qr(shortUrl(s==='…'?'preview':s)); }
function isoToLocal(iso){ try{ const d=new Date(iso); const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }catch{return '';} }
function closeForm(){ $('#mask').classList.remove('on'); }
$('#mask').addEventListener('click',e=>{ if(e.target.id==='mask') closeForm(); });

async function submitForm(){
  const id=$('#modal').dataset.id;
  const body={
    slug: $('#f_slug').value.trim(),
    title: $('#f_title').value.trim(),
    mode: formMode,
    redirect_type: Number($('#f_rt').value),
    pixel_fb: $('#f_fb').value.trim(),
    pixel_ga: $('#f_ga').value.trim(),
    pixel_gtm: $('#f_gtm').value.trim(),
    expires_at: $('#f_exp').value ? new Date($('#f_exp').value).toISOString() : '',
  };
  const pw=$('#f_pw').value; if(pw!=='') body.password = pw.trim()===''?'':pw; // 空白＝清除
  // 模式欄位
  if(formMode==='simple') body.target_url=$('#f_target').value.trim();
  else if(formMode==='ab'){
    body.variants=[...document.querySelectorAll('#abRows .abrow')].map(r=>({
      url:r.querySelector('.ab_url').value.trim(),
      weight:Number(r.querySelector('.ab_weight').value)||1,
      label:r.querySelector('.ab_label').value.trim(),
    })).filter(v=>v.url);
  } else {
    body.variants={ ios:$('#d_ios').value.trim(), android:$('#d_android').value.trim(), default:$('#d_default').value.trim() };
  }
  // UTM
  const utm={}; ['source','medium','campaign','term','content'].forEach(k=>{ const val=$('#u_'+k).value.trim(); if(val)utm[k]=val; });
  body.utm = Object.keys(utm).length?utm:null;

  if(!body.slug){ toast('請填短碼 slug'); return; }
  try{
    if(id) await api.update(Number(id),body); else await api.create(body);
    toast(id?'已更新':'已建立 /'+body.slug);
    closeForm(); setView('links');
  }catch(e){ toast('儲存失敗：'+e.message); }
}

/* ════════════════════ 啟動 ════════════════════ */
render();
</script>
</body>
